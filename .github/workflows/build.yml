name: ci

on:
  push:
    branches:
      - "main"
      - "test"

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Build Windows installer (NSIS)
        run: npx tauri build

      - name: Get version
        id: version
        shell: bash
        run: echo "VERSION=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Prepare downloads directory
        shell: bash
        run: mkdir -p web/downloads

      - name: Copy Windows installer
        shell: bash
        run: |
          WIN_INSTALLER=$(find src-tauri/target/release/bundle -name "*.exe" -type f 2>/dev/null | head -n 1)
          if [ -n "$WIN_INSTALLER" ]; then
            cp "$WIN_INSTALLER" "web/downloads/nia-todo-v${{ steps.version.outputs.VERSION }}-windows-x64-setup.exe"
            echo "WINDOWS_FILE=nia-todo-v${{ steps.version.outputs.VERSION }}-windows-x64-setup.exe" >> "$GITHUB_OUTPUT"
          fi
        id: windows

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: web/downloads/

  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 34
          build-tools: 34.0.0

      - name: Set up Android NDK
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "ndk;27.0.12077973" || true
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/27.0.12077973" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_ROOT=$ANDROID_HOME/ndk/27.0.12077973" >> "$GITHUB_ENV"
          NDK_BIN="$ANDROID_HOME/ndk/27.0.12077973/toolchains/llvm/prebuilt/linux-x86_64/bin"
          echo "CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER=${NDK_BIN}/aarch64-linux-android24-clang" >> "$GITHUB_ENV"
          echo "CC_aarch64_linux_android=${NDK_BIN}/aarch64-linux-android24-clang" >> "$GITHUB_ENV"
          echo "CXX_aarch64_linux_android=${NDK_BIN}/aarch64-linux-android24-clang++" >> "$GITHUB_ENV"
          echo "AR_aarch64_linux_android=${NDK_BIN}/llvm-ar" >> "$GITHUB_ENV"
          echo "${NDK_BIN}" >> "$GITHUB_PATH"

      - name: Install dependencies
        run: npm ci

      - name: Build Android APK
        run: npx tauri build --target aarch64-linux-android

      - name: Get version
        id: version
        run: echo "VERSION=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Prepare downloads directory
        run: mkdir -p web/downloads

      - name: Copy Android APK
        run: |
          ANDROID_APK=$(find src-tauri/target/aarch64-linux-android/release/bundle -name "*.apk" -type f 2>/dev/null | head -n 1)
          if [ -n "$ANDROID_APK" ]; then
            cp "$ANDROID_APK" "web/downloads/nia-todo-v${{ steps.version.outputs.VERSION }}-android-arm64.apk"
            echo "ANDROID_FILE=nia-todo-v${{ steps.version.outputs.VERSION }}-android-arm64.apk" >> "$GITHUB_OUTPUT"
          fi
        id: android

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-artifacts
          path: web/downloads/

  docker:
    needs: [build-windows, build-android]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare downloads directory
        run: mkdir -p web/downloads

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-artifacts
          path: web/downloads/

      - name: Download Android artifacts
        uses: actions/download-artifact@v4
        with:
          name: android-artifacts
          path: web/downloads/

      - name: Get version
        id: version
        run: echo "VERSION=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Generate app-downloads.json
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          WIN_FILE="nia-todo-v${VERSION}-windows-x64-setup.exe"
          ANDROID_FILE="nia-todo-v${VERSION}-android-arm64.apk"
          WIN_SHA=$(sha256sum "web/downloads/${WIN_FILE}" 2>/dev/null | cut -d' ' -f1 || echo '')
          ANDROID_SHA=$(sha256sum "web/downloads/${ANDROID_FILE}" 2>/dev/null | cut -d' ' -f1 || echo '')
          WIN_SIZE=$(stat -c%s "web/downloads/${WIN_FILE}" 2>/dev/null || echo 0)
          ANDROID_SIZE=$(stat -c%s "web/downloads/${ANDROID_FILE}" 2>/dev/null || echo 0)
          cat > web/downloads/app-downloads.json << EOF
          {
            "version": "${VERSION}",
            "latest": {
              "windows": {
                "platform": "windows",
                "arch": "x64",
                "url": "/downloads/${WIN_FILE}",
                "filename": "${WIN_FILE}",
                "sha256": "${WIN_SHA}",
                "size_bytes": ${WIN_SIZE}
              },
              "android": {
                "platform": "android",
                "arch": "arm64",
                "url": "/downloads/${ANDROID_FILE}",
                "filename": "${ANDROID_FILE}",
                "sha256": "${ANDROID_SHA}",
                "size_bytes": ${ANDROID_SIZE}
              }
            },
            "apps": []
          }
          EOF
          cat web/downloads/app-downloads.json

      - name: List downloads directory
        run: ls -la web/downloads/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PAT }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: "${{ vars.DOCKER_USER }}/nia-todo:latest"
