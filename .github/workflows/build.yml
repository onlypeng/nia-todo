name: ci

on:
  push:
    branches:
      - "main"
      - "test"

# 同一分支新推送时取消旧构建，节省资源
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────
  # 通用变量准备
  # ─────────────────────────────────────────────
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      branch: ${{ steps.meta.outputs.branch }}
      is_main: ${{ steps.meta.outputs.is_main }}
      image_tag: ${{ steps.meta.outputs.image_tag }}
      artifact_suffix: ${{ steps.meta.outputs.artifact_suffix }}
      tag_name: ${{ steps.meta.outputs.tag_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract metadata
        id: meta
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          VERSION=$(python3 -c "import json; print(json.load(open('src-tauri/tauri.conf.json'))['version'])")
          if [ "$BRANCH" = "main" ]; then
            IS_MAIN="true"
            IMAGE_TAG="${VERSION}"
            ARTIFACT_SUFFIX=""
            TAG_NAME="v${VERSION}"
          else
            IS_MAIN="false"
            IMAGE_TAG="${VERSION}-${BRANCH}"
            ARTIFACT_SUFFIX="-${BRANCH}"
            TAG_NAME="v${VERSION}-${BRANCH}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "branch=${BRANCH}" >> "$GITHUB_OUTPUT"
          echo "is_main=${IS_MAIN}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "artifact_suffix=${ARTIFACT_SUFFIX}" >> "$GITHUB_OUTPUT"
          echo "tag_name=${TAG_NAME}" >> "$GITHUB_OUTPUT"
          echo "Version: ${VERSION}, Branch: ${BRANCH}, ImageTag: ${IMAGE_TAG}, Tag: ${TAG_NAME}"

  # ─────────────────────────────────────────────
  # Windows 构建（原生编译）
  # ─────────────────────────────────────────────
  build-windows:
    needs: prepare
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: rust-windows-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: rust-windows-

      - name: Install dependencies
        run: npm ci

      - name: Build Windows installer (NSIS + MSI)
        run: npx tauri build --bundles nsis,msi

      - name: Prepare downloads directory
        shell: bash
        run: mkdir -p web/downloads

      - name: Copy Windows installer
        shell: bash
        run: |
          # 优先查找 NSIS 安装包（非 MSI bootstrap exe）
          WIN_INSTALLER=$(find src-tauri/target/release/bundle/nsis -name "*_x64-setup.exe" -type f 2>/dev/null | head -n 1)
          if [ -z "$WIN_INSTALLER" ]; then
            # 回退：查找 bundle 目录下任意 setup exe
            WIN_INSTALLER=$(find src-tauri/target/release/bundle -name "*-setup.exe" -type f 2>/dev/null | head -n 1)
          fi
          if [ -z "$WIN_INSTALLER" ]; then
            echo "::error::未找到 Windows 安装包"
            ls -R src-tauri/target/release/bundle/ 2>/dev/null || true
            exit 1
          fi
          cp "$WIN_INSTALLER" "web/downloads/nia-todo-v${{ needs.prepare.outputs.version }}-windows-x64-setup.exe"
          echo "Copied: $WIN_INSTALLER"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts${{ needs.prepare.outputs.artifact_suffix }}
          path: web/downloads/
          retention-days: 7

  # ─────────────────────────────────────────────
  # Android 构建
  # ─────────────────────────────────────────────
  build-android:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: rust-android-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: rust-android-

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 34
          build-tools: 34.0.0

      - name: Set up Android NDK
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "ndk;27.0.12077973" || true
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/27.0.12077973" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_ROOT=$ANDROID_HOME/ndk/27.0.12077973" >> "$GITHUB_ENV"
          NDK_BIN="$ANDROID_HOME/ndk/27.0.12077973/toolchains/llvm/prebuilt/linux-x86_64/bin"
          echo "CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER=${NDK_BIN}/aarch64-linux-android24-clang" >> "$GITHUB_ENV"
          echo "CC_aarch64_linux_android=${NDK_BIN}/aarch64-linux-android24-clang" >> "$GITHUB_ENV"
          echo "CXX_aarch64_linux_android=${NDK_BIN}/aarch64-linux-android24-clang++" >> "$GITHUB_ENV"
          echo "AR_aarch64_linux_android=${NDK_BIN}/llvm-ar" >> "$GITHUB_ENV"
          echo "${NDK_BIN}" >> "$GITHUB_PATH"

      - name: Install dependencies
        run: npm ci

      - name: Initialize Tauri Android project
        run: npx tauri android init --ci

      - name: Generate CI signing keystore
        run: |
          keytool -genkeypair \
            -alias ci-key \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -keystore $HOME/ci-keystore.jks \
            -storepass nia-todo-ci \
            -keypass nia-todo-ci \
            -dname "CN=nia-todo, OU=CI, O=nia-todo, L=CI, S=CI, C=DE"

      - name: Configure release signing and ABI filters
        run: |
          cat > src-tauri/gen/android/app/ci-signing.gradle <<'GRADLE'
          android {
            signingConfigs {
              ciRelease {
                storeFile file(System.getProperty('user.home') + '/ci-keystore.jks')
                storePassword 'nia-todo-ci'
                keyAlias 'ci-key'
                keyPassword 'nia-todo-ci'
              }
            }
            defaultConfig {
              ndk {
                abiFilters += 'arm64-v8a'
              }
            }
            buildTypes {
              release {
                signingConfig signingConfigs.ciRelease
                minifyEnabled true
                shrinkResources true
                proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
              }
            }
            splits {
              abi {
                enable true
                reset()
                include 'arm64-v8a'
                universalApk false
              }
            }
            packaging {
              jniLibs {
                excludes += ['lib/x86/**', 'lib/x86_64/**', 'lib/armeabi-v7a/**']
              }
            }
          }
          GRADLE
          echo "apply from: 'ci-signing.gradle'" >> src-tauri/gen/android/app/build.gradle.kts
          cat > src-tauri/gen/android/app/proguard-rules.pro <<'PRO'
          -keep class de.tobiaskneidl.** { *; }
          -keepclassmembers class * {
            @android.webkit.JavascriptInterface <methods>;
          }
          -keep class rust.** { *; }
          -keep class com.tauri.** { *; }
          PRO

      - name: Build Android APK (release, signed, arm64 only)
        run: npx tauri android build --apk

      - name: Prepare downloads directory
        run: mkdir -p web/downloads

      - name: Copy Android APK (arm64 only)
        run: |
          # 优先查找 arm64-v8a release APK
          ANDROID_APK=$(find src-tauri/gen/android -name "*arm64*.apk" -path "*/release/*" -type f 2>/dev/null | head -n 1)
          if [ -z "$ANDROID_APK" ]; then
            ANDROID_APK=$(find src-tauri/gen/android -name "*arm64*.apk" -type f 2>/dev/null | head -n 1)
          fi
          if [ -z "$ANDROID_APK" ]; then
            # 回退：查找任意 release APK
            ANDROID_APK=$(find src-tauri/gen/android -name "*.apk" -path "*/release/*" -type f 2>/dev/null | head -n 1)
          fi
          if [ -z "$ANDROID_APK" ]; then
            echo "::error::未找到 Android APK"
            find src-tauri/gen/android -name "*.apk" 2>/dev/null || true
            exit 1
          fi
          cp "$ANDROID_APK" "web/downloads/nia-todo-v${{ needs.prepare.outputs.version }}-android-arm64.apk"
          echo "Copied: $ANDROID_APK"
          echo "APK size: $(du -h "web/downloads/nia-todo-v${{ needs.prepare.outputs.version }}-android-arm64.apk" | cut -f1)"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-artifacts${{ needs.prepare.outputs.artifact_suffix }}
          path: web/downloads/
          retention-days: 7

  # ─────────────────────────────────────────────
  # Linux 客户端构建（AppImage + deb）
  # ─────────────────────────────────────────────
  build-linux:
    needs: prepare
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: rust-linux-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: rust-linux-

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev

      - name: Install dependencies
        run: npm ci

      - name: Build Linux AppImage and deb
        run: npx tauri build --bundles appimage,deb

      - name: Prepare downloads directory
        run: mkdir -p web/downloads

      - name: Copy Linux AppImage
        run: |
          APPIMAGE=$(find src-tauri/target/release/bundle -name "*.AppImage" -type f 2>/dev/null | head -n 1)
          if [ -z "$APPIMAGE" ]; then
            echo "::error::未找到 AppImage"
            find src-tauri/target/release/bundle/ -type f 2>/dev/null || true
            exit 1
          fi
          cp "$APPIMAGE" "web/downloads/nia-todo-v${{ needs.prepare.outputs.version }}-linux-x64.AppImage"
          echo "Copied: $APPIMAGE"

      - name: Copy Linux deb (client)
        run: |
          LINUX_DEB=$(find src-tauri/target/release/bundle/deb -name "*.deb" -type f 2>/dev/null | head -n 1)
          if [ -n "$LINUX_DEB" ]; then
            cp "$LINUX_DEB" "web/downloads/nia-todo-v${{ needs.prepare.outputs.version }}-linux-x64.deb"
            echo "Copied: $LINUX_DEB"
          else
            echo "No Linux client deb found (non-fatal)"
          fi

      - name: Report artifact sizes
        run: |
          echo "=== Linux client artifact sizes ==="
          ls -lah web/downloads/
          echo ""
          echo "=== Size comparison ==="
          APPIMAGE="web/downloads/nia-todo-v${{ needs.prepare.outputs.version }}-linux-x64.AppImage"
          if [ -f "$APPIMAGE" ]; then
            echo "AppImage: $(du -h "$APPIMAGE" | cut -f1)"
          fi
          DEB="web/downloads/nia-todo-v${{ needs.prepare.outputs.version }}-linux-x64.deb"
          if [ -f "$DEB" ]; then
            echo "deb: $(du -h "$DEB" | cut -f1)"
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-artifacts${{ needs.prepare.outputs.artifact_suffix }}
          path: web/downloads/
          retention-days: 7

  # ─────────────────────────────────────────────
  # Linux 服务器端 deb 包构建
  # ─────────────────────────────────────────────
  build-deb:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dpkg-deb
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev

      - name: Cache pip wheels
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-deb-${{ hashFiles('requirements.txt') }}

      - name: Build deb package
        run: |
          chmod +x scripts/build-deb.sh
          ./scripts/build-deb.sh "${{ needs.prepare.outputs.version }}"

      - name: Verify deb
        run: |
          DEB_FILE="dist/nia-todo-server-v${{ needs.prepare.outputs.version }}-full.deb"
          if [ ! -f "$DEB_FILE" ]; then
            echo "::error::deb 包未生成"
            ls -la dist/ || true
            exit 1
          fi
          echo "deb 包信息:"
          dpkg-deb --info "$DEB_FILE"
          echo ""
          echo "deb 包内容:"
          dpkg-deb --contents "$DEB_FILE" | head -30
          echo ""
          echo "SHA256: $(sha256sum "$DEB_FILE" | cut -d' ' -f1)"
          echo "Size: $(du -h "$DEB_FILE" | cut -f1)"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: deb-artifacts${{ needs.prepare.outputs.artifact_suffix }}
          path: dist/
          retention-days: 7

  # ─────────────────────────────────────────────
  # Docker 镜像构建与推送
  # ─────────────────────────────────────────────
  docker:
    needs: [prepare, build-windows, build-android, build-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare downloads directory
        run: mkdir -p web/downloads

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-artifacts${{ needs.prepare.outputs.artifact_suffix }}
          path: web/downloads/

      - name: Download Android artifacts
        uses: actions/download-artifact@v4
        with:
          name: android-artifacts${{ needs.prepare.outputs.artifact_suffix }}
          path: web/downloads/

      - name: Download Linux client artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-artifacts${{ needs.prepare.outputs.artifact_suffix }}
          path: web/downloads/

      - name: Verify artifacts
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          WIN_FILE="nia-todo-v${VERSION}-windows-x64-setup.exe"
          ANDROID_FILE="nia-todo-v${VERSION}-android-arm64.apk"
          LINUX_FILE="nia-todo-v${VERSION}-linux-x64.AppImage"
          echo "Expected files: ${WIN_FILE}, ${ANDROID_FILE}, ${LINUX_FILE}"
          for f in "$WIN_FILE" "$ANDROID_FILE" "$LINUX_FILE"; do
            if [ ! -f "web/downloads/$f" ]; then
              echo "::error::缺少构建产物: $f"
              ls -la web/downloads/ || true
              exit 1
            fi
          done
          echo "All artifacts verified"

      - name: Generate app-downloads.json
        env:
          APP_VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          WIN_FILE="nia-todo-v${APP_VERSION}-windows-x64-setup.exe"
          ANDROID_FILE="nia-todo-v${APP_VERSION}-android-arm64.apk"
          LINUX_FILE="nia-todo-v${APP_VERSION}-linux-x64.AppImage"
          export WIN_FILE ANDROID_FILE LINUX_FILE
          export WIN_SHA=$(sha256sum "web/downloads/${WIN_FILE}" | cut -d' ' -f1)
          export ANDROID_SHA=$(sha256sum "web/downloads/${ANDROID_FILE}" | cut -d' ' -f1)
          export LINUX_SHA=$(sha256sum "web/downloads/${LINUX_FILE}" | cut -d' ' -f1)
          export WIN_SIZE=$(stat -c%s "web/downloads/${WIN_FILE}")
          export ANDROID_SIZE=$(stat -c%s "web/downloads/${ANDROID_FILE}")
          export LINUX_SIZE=$(stat -c%s "web/downloads/${LINUX_FILE}")
          python3 <<'PYEOF'
          import json, os, re, sys

          version = os.environ['APP_VERSION']
          win_file = os.environ['WIN_FILE']
          android_file = os.environ['ANDROID_FILE']
          linux_file = os.environ['LINUX_FILE']
          win_sha = os.environ['WIN_SHA']
          android_sha = os.environ['ANDROID_SHA']
          linux_sha = os.environ['LINUX_SHA']
          win_size = int(os.environ['WIN_SIZE'])
          android_size = int(os.environ['ANDROID_SIZE'])
          linux_size = int(os.environ['LINUX_SIZE'])

          # Validate version format
          version_re = re.compile(r'^v?\d+\.\d+\.\d+(?:[-.][0-9A-Za-z.-]+)?$')
          if not version_re.match(version):
              print(f'ERROR: version "{version}" does not match required format', file=sys.stderr)
              sys.exit(1)

          # Validate sha256
          sha_re = re.compile(r'^[a-f0-9]{64}$')
          for name, sha in [('windows', win_sha), ('android', android_sha), ('linux', linux_sha)]:
              if not sha_re.match(sha):
                  print(f'ERROR: {name} sha256 "{sha}" is not 64 hex chars', file=sys.stderr)
                  sys.exit(1)

          # Validate filenames
          version_slug = version.lstrip('v')
          expected_win = f'nia-todo-v{version_slug}-windows-x64-setup.exe'
          expected_android = f'nia-todo-v{version_slug}-android-arm64.apk'
          expected_linux = f'nia-todo-v{version_slug}-linux-x64.AppImage'
          for name, f, expected in [
              ('windows', win_file, expected_win),
              ('android', android_file, expected_android),
              ('linux', linux_file, expected_linux),
          ]:
              if f != expected:
                  print(f'ERROR: {name} filename "{f}" != expected "{expected}"', file=sys.stderr)
                  sys.exit(1)

          # Validate sizes
          for name, size in [('windows', win_size), ('android', android_size), ('linux', linux_size)]:
              if not isinstance(size, int) or size <= 0:
                  print(f'ERROR: {name} size_bytes {size} is not a positive integer', file=sys.stderr)
                  sys.exit(1)

          manifest = {
              'version': version,
              'latest': {
                  'windows': {
                      'platform': 'windows',
                      'arch': 'x64',
                      'url': f'/downloads/{win_file}',
                      'filename': win_file,
                      'sha256': win_sha,
                      'size_bytes': win_size,
                      'version': version,
                  },
                  'android': {
                      'platform': 'android',
                      'arch': 'arm64',
                      'url': f'/downloads/{android_file}',
                      'filename': android_file,
                      'sha256': android_sha,
                      'size_bytes': android_size,
                      'version': version,
                  },
                  'linux': {
                      'platform': 'linux',
                      'arch': 'x64',
                      'url': f'/downloads/{linux_file}',
                      'filename': linux_file,
                      'sha256': linux_sha,
                      'size_bytes': linux_size,
                      'version': version,
                  },
              },
              'apps': [],
          }
          with open('web/downloads/app-downloads.json', 'w') as f:
              json.dump(manifest, f, indent=2)
          print('app-downloads.json generated and validated successfully')
          PYEOF
          python3 -m json.tool web/downloads/app-downloads.json > /dev/null
          echo "--- Manifest content ---"
          cat web/downloads/app-downloads.json

      - name: List downloads directory
        run: ls -lah web/downloads/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PAT }}

      - name: Docker metadata
        id: docker_meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ vars.DOCKER_USER }}/nia-todo
          tags: |
            type=raw,value=${{ needs.prepare.outputs.image_tag }}
            type=raw,value=latest,enable=${{ needs.prepare.outputs.is_main == 'true' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.docker_meta.outputs.tags }}
          labels: ${{ steps.docker_meta.outputs.labels }}
          cache-from: type=registry,ref=${{ vars.DOCKER_USER }}/nia-todo:cache
          cache-to: type=registry,ref=${{ vars.DOCKER_USER }}/nia-todo:cache,mode=max

  # ─────────────────────────────────────────────
  # GitHub Release 发布（仅 main 分支）
  # ─────────────────────────────────────────────
  release:
    needs: [prepare, build-windows, build-android, build-linux, build-deb, docker]
    if: ${{ needs.prepare.outputs.is_main == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare release assets directory
        run: mkdir -p release-assets

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-artifacts
          path: release-assets/

      - name: Download Android artifacts
        uses: actions/download-artifact@v4
        with:
          name: android-artifacts
          path: release-assets/

      - name: Download Linux client artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-artifacts
          path: release-assets/

      - name: Download deb artifacts
        uses: actions/download-artifact@v4
        with:
          name: deb-artifacts
          path: release-assets/

      - name: List release assets
        run: |
          echo "Release assets:"
          ls -lah release-assets/
          echo ""
          echo "SHA256 checksums:"
          cd release-assets && sha256sum * || true

      - name: Generate checksums file
        run: |
          cd release-assets
          sha256sum * > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create GitHub Tag
        uses: actions/github-script@v7
        with:
          script: |
            const tag = '${{ needs.prepare.outputs.tag_name }}';
            const ref = `refs/tags/${tag}`;
            try {
              await github.rest.git.createRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: ref,
                sha: context.sha
              });
              console.log(`Created tag: ${tag}`);
            } catch (error) {
              if (error.status === 422) {
                console.log(`Tag ${tag} already exists, updating...`);
                await github.rest.git.updateRef({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ref: `tags/${tag}`,
                  sha: context.sha,
                  force: true
                });
              } else {
                throw error;
              }
            }

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag_name }}
          name: nia-todo ${{ needs.prepare.outputs.tag_name }}
          body: |
            ## nia-todo ${{ needs.prepare.outputs.tag_name }}

            ### 下载

            | 平台 | 文件 | 说明 |
            |------|------|------|
            | Windows | `nia-todo-v${{ needs.prepare.outputs.version }}-windows-x64-setup.exe` | NSIS 安装程序 |
            | Android | `nia-todo-v${{ needs.prepare.outputs.version }}-android-arm64.apk` | APK 安装包 |
            | Linux 客户端 | `nia-todo-v${{ needs.prepare.outputs.version }}-linux-x64.AppImage` | AppImage 免安装 |
            | Linux 客户端 | `nia-todo-v${{ needs.prepare.outputs.version }}-linux-x64.deb` | Debian/Ubuntu 客户端包 |
